<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Billetera Digital Universal - Iniciar Sesión</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../css/estilo.css">
</head>
<body data-page="index"> <main class="container d-flex justify-content-center align-items-center">
    <div class="landing-card text-center">
      <h2 class="landing-brand fw-bold mb-4">Iniciar Sesión</h2>
      
      <form id="loginForm" novalidate>
        <div class="mb-3 text-start">
          <label for="txtCorreo" class="form-label fw-bold">Correo Electrónico</label>
          <input type="email" class="form-control" id="txtCorreo" placeholder="ejemplo@demo.cl" required>
        </div>
        
        <div class="mb-4 text-start">
          <label for="txtPassword" class="form-label fw-bold">Contraseña</label>
          <input type="password" class="form-control" id="txtPassword" placeholder="******" required>
        </div>
        
        <div class="d-grid gap-2 col-12 col-sm-8 mx-auto">
          <button type="submit" class="btn btn-custom-dark btn-lg px-4">Ingresar</button>
        </div>
      </form>
      
      <p class="landing-note mt-4 mb-0">© Claudio Gutiérrez - 2026</p>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="../js/app.js"></script>
</body>
</html>
