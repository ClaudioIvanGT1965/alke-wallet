<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Billetera Digital Universal - Historial de Transacciones</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../css/estilo.css">
</head>
<body data-page="transacciones">

  <header class="custom-header navbar navbar-expand-lg navbar-dark shadow">
    <div class="container-fluid px-4">
      <a class="navbar-brand fw-bold text-black" href="#">Billetera Universal</a>
      <button class="navbar-toggler bg-black" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav nav-links-container">
          <li class="nav-item"><a class="nav-link" href="../main/menu.html">Inicio</a></li>
          <li class="nav-item"><a class="nav-link" href="../depositos/deposits.html">Depositar</a></li>
          <li class="nav-item"><a class="nav-link" href="sendmoney.html">Transferir</a></li>
          <li class="nav-item"><a class="nav-link" href="../movimientos/transactions.html">Movimientos</a></li>
        </ul>
        <div class="ms-auto">
          <a class="btn btn-exit px-4 fw-bold" href="../index.html">Cerrar sesión</a>
        </div>
      </div>
    </div>
  </header>

  <main class="container mt-5">
    <div class="card p-4 shadow-sm mb-4" style="border: 2px solid #000; background-color: rgba(255,255,255,0.95);">
      <div class="row align-items-center">
        <div class="col-md-6">
          <h3 class="fw-bold mb-1" id="lblNombreTransac">Cargando usuario...</h3>
          <p class="text-muted mb-0">N° Cuenta: <span id="lblCuentaTransac">-----</span></p>
        </div>
        <div class="col-md-6 text-md-end mt-3 mt-md-0">
          <span class="fs-5 fw-bold text-dark">Saldo Disponible:</span>
          <h2 class="text-danger fw-bold mb-0">$<span id="lblSaldoTransac">0</span></h2>
        </div>
      </div>
    </div>

    <div class="card p-4 shadow-sm" style="border: 2px solid #000; background-color: rgba(255,255,255,0.95);">
      <h4 class="fw-bold mb-3">Historial de Movimientos</h4>
      <hr style="border-top: 2px solid #000;">
      
      <div class="table-responsive">
        <table class="table table-hover align-middle text-nowrap">
          <thead class="table-dark">
            <tr>
              <th scope="col">Fecha</th>
              <th scope="col">Tipo</th>
              <th scope="col">Detalle</th>
              <th scope="col">Descripción / Mensaje</th>
              <th scope="col" class="text-end">Monto</th>
            </tr>
          </thead>
          <tbody id="tablaMovimientosBody">
            <tr>
              <td colspan="5" class="text-center text-muted">No se registran movimientos en esta cuenta.</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="../js/app.js"></script>
</body>
</html>
