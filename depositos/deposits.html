<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Billetera Digital Universal - Depósitos y Giros</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../css/estilo.css">
</head>
<body data-page="depositos">

  <header class="custom-header navbar navbar-expand-lg navbar-dark shadow">
    <div class="container-fluid px-4">
      <a class="navbar-brand fw-bold text-black" href="#">Billetera Universal</a>
      <button class="navbar-toggler bg-black" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav nav-links-container">
          <li class="nav-item"><a class="nav-link" href="../main/menu.html">Inicio</a></li>
          <li class="nav-item"><a class="nav-link" href="deposits.html">Depositar</a></li>
          <li class="nav-item"><a class="nav-link" href="../transacciones/sendmoney.html">Transferir</a></li>
          <li class="nav-item"><a class="nav-link" href="../movimientos/transactions.html">Movimientos</a></li>
        </ul>
        <div class="ms-auto">
          <a class="btn btn-exit px-4 fw-bold" href="../index.html">Cerrar sesión</a>
        </div>
      </div>
    </div>
  </header>

  <main class="container mt-5">
    <div class="row justify-content-center">
      <div class="col-md-6">
        <div class="card p-4 shadow-sm text-start" style="border: 2px solid #000; background-color: rgba(255,255,255,0.95);">
          <h3 class="fw-bold mb-4 text-center">Operaciones de Cuenta</h3>
          <hr style="border-top: 2px solid #000;">
          
          <div class="mb-4 bg-light p-3 rounded border">
            <p class="fs-5 mb-1"><strong>Usuario:</strong> <span id="lblNombre">Cargando...</span></p>
            <p class="fs-4 text-danger mb-0"><strong>Saldo Disponible:</strong> $<span id="lblSaldo">0</span></p>
          </div>

          <form id="transactionForm" novalidate>
            <div class="mb-3">
              <label for="cmbTipo" class="form-label fw-bold">Tipo de Operación</label>
              <select class="form-select border-dark" id="cmbTipo" required>
                <option value="Deposito" selected>DEPOSITO</option>
                <option value="Giro">GIRO</option>
              </select>
            </div>

            <div class="mb-4">
              <label for="txtCantidad" class="form-label fw-bold">Cantidad ($)</label>
              <input type="text" class="form-control border-dark" id="txtCantidad" placeholder="Ej: 50.000" required autocomplete="off">
            </div>

            <div class="d-grid gap-2">
              <button type="submit" class="btn btn-custom-dark btn-lg fw-bold">Confirmar</button>
            </div>
          </form>
          
        </div>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="../js/app.js"></script>
</body>
</html>
